<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — D'Vaaw</title>
<link rel="stylesheet" href="styles.css">
<style>
.cart-wrap {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: clamp(2rem, 5vw, 4rem);
    padding: clamp(2.5rem, 5vw, 4rem) var(--pad-x);
    flex: 1;
    align-items: start;
}
.cart-items { min-width: 0; }
.cart-row {
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 1.4rem;
    align-items: center;
    padding: 1.6rem 0;
    border-bottom: 1px solid var(--line);
    animation: fade 0.4s var(--ease) both;
}
@keyframes fade { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:none; } }
.cart-row .ci-img { aspect-ratio: 3/4; background: var(--mist); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.cart-row .ci-img img { max-height: 100%; object-fit: contain; }
.cart-row .ci-img .ph { font-family: var(--display); font-style: italic; font-size: 0.7rem; color: var(--muted); text-align: center; padding: 0.4rem; }
.ci-info h3 { font-family: var(--display); font-size: 1.3rem; font-weight: 500; margin-bottom: 0.3rem; }
.ci-info .ci-meta { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.7rem; }
.ci-size-tag { display: inline-block; background: var(--mist); padding: 0.2rem 0.7rem; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
.ci-qty { display: inline-flex; align-items: center; border: 1px solid var(--line); margin-top: 0.8rem; }
.ci-qty button { padding: 0.4rem 0.8rem; font-size: 1rem; color: var(--muted); transition: all 0.2s; }
.ci-qty button:hover { background: var(--black); color: var(--gold); }
.ci-qty span { padding: 0 0.8rem; font-size: 0.85rem; min-width: 2.4rem; text-align: center; }
.ci-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.8rem; height: 100%; }
.ci-price { font-size: 1rem; font-weight: 500; }
.ci-remove { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid transparent; transition: all 0.2s; }
.ci-remove:hover { color: var(--gold); border-color: var(--gold); }

.cart-empty { text-align: center; padding: 5rem 1rem; }
.cart-empty .ce-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 1.2rem; }
.cart-empty p { color: var(--muted); margin-bottom: 1.8rem; font-size: 1.05rem; }

.summary {
    background: var(--ink);
    color: #fff;
    padding: clamp(1.8rem, 3vw, 2.6rem);
    position: sticky;
    top: 88px;
}
.summary h2 { font-size: 1.6rem; font-weight: 400; margin-bottom: 1.8rem; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sum-row { display: flex; justify-content: space-between; font-size: 0.88rem; color: rgba(255,255,255,0.65); margin-bottom: 1rem; }
.sum-total { display: flex; justify-content: space-between; font-size: 1.3rem; font-family: var(--display); color: #fff; margin-top: 1.4rem; padding-top: 1.4rem; border-top: 1px solid rgba(255,255,255,0.1); }
.sum-note { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 0.5rem; line-height: 1.6; }
.checkout-btn { width: 100%; margin-top: 1.8rem; }
.checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.secure { text-align: center; font-size: 0.68rem; color: rgba(255,255,255,0.4); margin-top: 1rem; letter-spacing: 0.04em; }

@media (max-width: 900px) {
    .cart-wrap { grid-template-columns: 1fr; }
    .summary { position: static; }
}
@media (max-width: 540px) {
    .cart-row { grid-template-columns: 70px 1fr; }
    .ci-right { grid-column: 1 / -1; flex-direction: row; justify-content: space-between; align-items: center; }
}
</style>
</head>
<body>

<section class="page-intro">
    <span class="eyebrow">Step 1 of 2</span>
    <h1>Your Cart</h1>
</section>

<section class="cart-wrap" id="cartWrap">
    <div class="cart-items" id="cartItems"></div>
    <aside class="summary">
        <h2>Summary</h2>
        <div class="sum-row"><span>Subtotal</span><span>RM<span id="subtotal">0.00</span></span></div>
        <div class="sum-row"><span>Shipping (Sarawak)</span><span>RM<span id="shipping">0.00</span></span></div>
        <div class="sum-total"><span>Total</span><span>RM<span id="total">0.00</span></span></div>
        <p class="sum-note">Sarawak rate shown. Final shipping for other states is confirmed on WhatsApp.</p>
        <button class="btn btn-wa checkout-btn" id="checkoutBtn" onclick="checkout()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.6.1-.2.3-.7.9-.8 1-.1.2-.3.2-.5.1-.7-.3-1.4-.6-2-1.1-.5-.5-.9-1-1.3-1.6-.1-.2 0-.4.1-.5.1-.1.2-.3.4-.4.1-.1.2-.2.2-.4.1-.1 0-.3 0-.4-.1-.1-.6-1.4-.8-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.4.1-.6.3-.7.7-.9 1.5-.9 2.5 0 1.5 1.1 2.9 1.2 3.1.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.7-.7 2-1.4.2-.7.2-1.2.1-1.4-.1-.1-.3-.2-.6-.3M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2"/></svg>
            Order via WhatsApp
        </button>
        <p class="secure">No online payment — confirmed personally via WhatsApp</p>
    </aside>
</section>

<script src="app.js"></script>
<script>
function render() {
    const cart = window.DVAAW.getCart();
    const wrap = document.getElementById('cartItems');
    const btn = document.getElementById('checkoutBtn');

    if (!cart.length) {
        wrap.innerHTML = `
            <div class="cart-empty">
                <div class="ce-icon">🛍️</div>
                <p>Your cart is empty.</p>
                <a href="shop.html" class="btn btn-dark">Browse Fragrances</a>
            </div>`;
        document.getElementById('subtotal').textContent = '0.00';
        document.getElementById('shipping').textContent = '0.00';
        document.getElementById('total').textContent = '0.00';
        btn.disabled = true;
        return;
    }

    btn.disabled = false;
    wrap.innerHTML = cart.map((it, i) => `
        <div class="cart-row">
            <div class="ci-img"><img src="${it.img}" alt="${it.name}" onerror="this.outerHTML='<div class=&quot;ph&quot;>${it.name}</div>'"></div>
            <div class="ci-info">
                <h3>${it.name}</h3>
                <div class="ci-meta">${it.cat}</div>
                <span class="ci-size-tag">${it.size}</span>
                <div class="ci-qty">
                    <button onclick="changeQty(${i},-1)">−</button>
                    <span>${it.qty}</span>
                    <button onclick="changeQty(${i},1)">+</button>
                </div>
            </div>
            <div class="ci-right">
                <div class="ci-price">RM${(it.price * it.qty).toFixed(2)}</div>
                <button class="ci-remove" onclick="removeRow(${i})">Remove</button>
            </div>
        </div>`).join('');

    const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
    const shipping = 10;
    document.getElementById('subtotal').textContent = subtotal.toFixed(2);
    document.getElementById('shipping').textContent = shipping.toFixed(2);
    document.getElementById('total').textContent = (subtotal + shipping).toFixed(2);
}

function changeQty(i, d) {
    const cart = window.DVAAW.getCart();
    if (!cart[i]) return;
    cart[i].qty += d;
    if (cart[i].qty < 1) cart.splice(i, 1);
    window.DVAAW.setCart(cart);
    render();
}

function removeRow(i) {
    const cart = window.DVAAW.getCart();
    cart.splice(i, 1);
    window.DVAAW.setCart(cart);
    render();
}

function checkout() {
    const cart = window.DVAAW.getCart();
    if (!cart.length) return;

    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.textContent = 'Opening WhatsApp…';

    const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
    const shipping = 10;
    const total = subtotal + shipping;

    let msg = "*NEW ORDER — D'VAAW PERFUME* ✨\n\n*ITEMS*\n";
    cart.forEach(it => { msg += `▪️ ${it.qty}× ${it.name} (${it.size}) — RM${(it.price*it.qty).toFixed(2)}\n`; });
    msg += `\n*SUMMARY*\nSubtotal: RM${subtotal.toFixed(2)}\nShipping (Sarawak): RM${shipping.toFixed(2)}\n*Total: RM${total.toFixed(2)}*\n\n`;
    msg += "Hi! I'd like to place this order. Please confirm shipping for my address and share payment details.";

    // Save for confirmation page
    localStorage.setItem('dvaaw_last_order', JSON.stringify({
        items: cart, subtotal, shipping, total, date: new Date().toISOString()
    }));

    // Firebase logging (optional, never blocks)
    if (window.dvaawSaveOrder) window.dvaawSaveOrder(cart, subtotal, shipping, total);

    localStorage.removeItem('dvaaw_cart');
    window.location.href = 'https://wa.me/' + window.DVAAW.WHATSAPP + '?text=' + encodeURIComponent(msg);
    setTimeout(() => { window.location.href = 'confirmation.html'; }, 1200);
}

render();
</script>

<!-- Firebase — separate module, optional, never blocks cart -->
<script type="module">
try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
    const { getFirestore, collection, addDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
    const app = initializeApp({
        apiKey: "AIzaSyCxOigVTO2ZCeKYoVRJvU085fEiEL9EKOI",
        authDomain: "d-vaaw-perfume.firebaseapp.com",
        databaseURL: "https://d-vaaw-perfume-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "d-vaaw-perfume",
        storageBucket: "d-vaaw-perfume.firebasestorage.app",
        messagingSenderId: "176200300799",
        appId: "1:176200300799:web:ee8893e3e3e6a4dd14b4ca"
    });
    const db = getFirestore(app);
    window.dvaawSaveOrder = function(cart, subtotal, shipping, total) {
        addDoc(collection(db, "orders"), {
            orderItems: cart, subtotal, shippingFee: shipping, totalAmount: total,
            status: "Pending WhatsApp Confirmation", timestamp: serverTimestamp()
        }).catch(e => console.error("Firebase save failed:", e));
    };
} catch (e) {
    console.warn("Firebase unavailable — orders still work via WhatsApp.", e);
}
</script>
</body>
</html>
